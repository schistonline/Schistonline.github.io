<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Category - iBlue B2B</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/category.css">
</head>
<body>
    <!-- Simple Header -->
    <header class="header">
        <div class="header-content">
            <a href="index.html" class="logo">
                <div class="logo-circle">i</div>
                <span class="logo-text">iBlue<span>B2B</span></span>
            </a>
            
            <button class="search-toggle" id="searchToggle">
                <i class="fas fa-search"></i>
            </button>
        </div>
        
        <!-- Search Bar (Hidden by default) -->
        <div class="search-bar" id="searchBar">
            <input type="text" placeholder="Search in this category..." id="searchInput">
            <button class="search-close" id="searchClose"><i class="fas fa-times"></i></button>
        </div>
    </header>

    <!-- Category Header -->
    <div class="category-header" id="categoryHeader">
        <!-- Populated by JS -->
        <div class="loading-header">
            <div class="spinner"></div>
        </div>
    </div>

    <!-- Filter Bar -->
    <div class="filter-bar">
        <button class="filter-btn" id="filterToggle">
            <i class="fas fa-sliders-h"></i> Filter
        </button>
        <button class="sort-btn" id="sortToggle">
            <i class="fas fa-sort-amount-down"></i> Sort
        </button>
        <span class="product-count" id="productCount">0 products</span>
    </div>

    <!-- Filter Panel (Hidden by default) -->
    <div class="filter-panel" id="filterPanel">
        <div class="filter-section">
            <h4>Price Range</h4>
            <div class="price-inputs">
                <input type="number" id="minPrice" placeholder="Min" min="0">
                <span>to</span>
                <input type="number" id="maxPrice" placeholder="Max" min="0">
            </div>
        </div>
        
        <div class="filter-section">
            <h4>Supplier Location</h4>
            <select id="locationFilter">
                <option value="">All Locations</option>
                <option value="Kampala">Kampala</option>
                <option value="Wakiso">Wakiso</option>
                <option value="Mukono">Mukono</option>
                <option value="Jinja">Jinja</option>
                <option value="Mbarara">Mbarara</option>
            </select>
        </div>
        
        <div class="filter-section">
            <h4>Verified Suppliers Only</h4>
            <label class="checkbox-label">
                <input type="checkbox" id="verifiedOnly">
                <span>Show verified suppliers</span>
            </label>
        </div>
        
        <div class="filter-actions">
            <button class="apply-btn" id="applyFilters">Apply</button>
            <button class="reset-btn" id="resetFilters">Reset</button>
        </div>
    </div>

    <!-- Sort Panel (Hidden by default) -->
    <div class="sort-panel" id="sortPanel">
        <button class="sort-option" data-sort="popular">
            <i class="fas fa-fire"></i> Most Popular
        </button>
        <button class="sort-option" data-sort="price-low">
            <i class="fas fa-arrow-up"></i> Price: Low to High
        </button>
        <button class="sort-option" data-sort="price-high">
            <i class="fas fa-arrow-down"></i> Price: High to Low
        </button>
        <button class="sort-option" data-sort="newest">
            <i class="fas fa-clock"></i> Newest First
        </button>
    </div>

    <!-- Products Grid -->
    <main class="products-grid" id="productsGrid">
        <!-- Populated by JS -->
        <div class="loading-grid">
            <div class="spinner"></div>
            <p>Loading products...</p>
        </div>
    </main>

    <!-- Simple Footer -->
    <footer class="footer">
        <p>&copy; 2026 iBlue B2B. All rights reserved.</p>
    </footer>

    <!-- Quick View Modal -->
    <div class="modal" id="quickViewModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Product Details</h3>
                <button class="modal-close" onclick="closeQuickView()">&times;</button>
            </div>
            <div class="modal-body" id="quickViewBody">
                <!-- Populated by JS -->
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/category.js"></script>
</body>
</html>
