<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Company Profile - Supplier Dashboard | iBlue B2B</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/supplier-company-profile.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar (same as above) -->
        <aside class="sidebar">
            <!-- ... same sidebar ... -->
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="content-header">
                <div class="header-title">
                    <h1>Company Profile</h1>
                    <p>Tell buyers about your business</p>
                </div>
                <div class="header-actions">
                    <button class="btn btn-primary" onclick="saveCompanyProfile()">
                        <i class="fas fa-save"></i> Save Changes
                    </button>
                </div>
            </div>

            <form id="companyProfileForm">
                <!-- About Section -->
                <div class="section-card">
                    <h3><i class="fas fa-info-circle"></i> About Company</h3>
                    
                    <div class="form-group">
                        <label>About Us</label>
                        <textarea id="about" rows="5" placeholder="Tell buyers about your company..."></textarea>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Mission Statement</label>
                            <input type="text" id="mission" placeholder="Our mission...">
                        </div>
                        <div class="form-group">
                            <label>Vision Statement</label>
                            <input type="text" id="vision" placeholder="Our vision...">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Core Values (one per line)</label>
                        <textarea id="coreValues" rows="4" placeholder="Quality&#10;Integrity&#10;Innovation"></textarea>
                    </div>
                </div>

                <!-- Facilities Section -->
                <div class="section-card">
                    <h3><i class="fas fa-building"></i> Facilities & Capacity</h3>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Factory Size</label>
                            <input type="text" id="factorySize" placeholder="e.g., 25,000 m²">
                        </div>
                        <div class="form-group">
                            <label>Factory Location</label>
                            <input type="text" id="factoryLocation" placeholder="e.g., Zhejiang, China">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Number of Employees</label>
                            <input type="number" id="employeeCount" placeholder="e.g., 110">
                        </div>
                        <div class="form-group">
                            <label>Annual Revenue</label>
                            <input type="text" id="annualRevenue" placeholder="e.g., USh 4B+">
                        </div>
                    </div>
                </div>

                <!-- Certifications -->
                <div class="section-card">
                    <div class="card-header">
                        <h3><i class="fas fa-certificate"></i> Certifications</h3>
                        <button type="button" class="btn btn-sm btn-outline" onclick="addCertification()">
                            <i class="fas fa-plus"></i> Add Certification
                        </button>
                    </div>
                    
                    <div id="certificationsList"></div>
                </div>

                <!-- Export Markets -->
                <div class="section-card">
                    <h3><i class="fas fa-globe"></i> Export Markets</h3>
                    
                    <div class="form-group">
                        <label>Markets (comma separated)</label>
                        <input type="text" id="exportMarkets" placeholder="e.g., Africa, Europe, Middle East">
                    </div>
                </div>

                <!-- Timeline -->
                <div class="section-card">
                    <div class="card-header">
                        <h3><i class="fas fa-history"></i> Company Timeline</h3>
                        <button type="button" class="btn btn-sm btn-outline" onclick="addTimelineEvent()">
                            <i class="fas fa-plus"></i> Add Event
                        </button>
                    </div>
                    
                    <div id="timelineList"></div>
                </div>
            </form>
        </main>
    </div>

    <!-- Certification Modal -->
    <div class="modal" id="certificationModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Add Certification</h3>
                <button class="modal-close" onclick="closeCertificationModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Certification Name</label>
                    <input type="text" id="certName">
                </div>
                <div class="form-group">
                    <label>Issuing Body</label>
                    <input type="text" id="certIssuer">
                </div>
                <div class="form-group">
                    <label>Year Obtained</label>
                    <input type="number" id="certYear">
                </div>
                <div class="form-group">
                    <label>Certificate Image</label>
                    <input type="file" id="certImage" accept="image/*">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" onclick="saveCertification()">Save</button>
                <button class="btn btn-outline" onclick="closeCertificationModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supplier-company-profile.js"></script>
</body>
</html>
