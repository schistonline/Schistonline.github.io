<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes"/>
  <title>My Quotations - BuyUganda.online</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background: #f5f5f5;
    }

    .container {
      max-width: 450px;
      margin: auto;
      background: #fff;
      min-height: 100vh;
      position: relative;
      padding-bottom: 80px;
    }

    /* Header */
    .header {
      background: white;
      padding: 16px 20px;
      border-bottom: 1px solid #eee;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-content {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: #0B4F6C;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      font-size: 16px;
    }

    .logo-text {
      font-weight: 700;
      font-size: 18px;
      color: #0B4F6C;
    }

    .back-btn {
      background: none;
      border: none;
      font-size: 20px;
      color: #333;
      cursor: pointer;
    }

    /* Stats Row */
    .stats-row {
      display: flex;
      gap: 12px;
      padding: 16px 20px;
      background: white;
      border-bottom: 1px solid #eee;
    }

    .stat-card {
      flex: 1;
      background: #f8f9fa;
      border-radius: 12px;
      padding: 12px;
      text-align: center;
    }

    .stat-number {
      font-size: 24px;
      font-weight: bold;
      color: #0B4F6C;
    }

    .stat-label {
      font-size: 11px;
      color: #666;
      margin-top: 4px;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 4px;
      padding: 12px 16px;
      background: white;
      border-bottom: 1px solid #eee;
    }

    .tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      background: none;
      border: none;
      font-size: 14px;
      font-weight: 500;
      color: #666;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab.active {
      background: #0B4F6C;
      color: white;
    }

    /* Quote List */
    .quote-list {
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Quote Card */
    .quote-card {
      background: white;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      border: 1px solid #eee;
    }

    .quote-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .quote-number {
      font-weight: 600;
      font-size: 14px;
      color: #0B4F6C;
    }

    .status-badge {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }

    .status-badge.draft {
      background: #f0f0f0;
      color: #666;
    }

    .status-badge.sent {
      background: #e3f2fd;
      color: #1976d2;
    }

    .status-badge.accepted {
      background: #e8f5e9;
      color: #4caf50;
    }

    .status-badge.rejected {
      background: #ffebee;
      color: #f44336;
    }

    .buyer-name {
      font-size: 15px;
      font-weight: 500;
      color: #333;
      margin-bottom: 8px;
    }

    .quote-details {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 12px;
      margin: 12px 0;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      margin-bottom: 8px;
    }

    .detail-row:last-child {
      margin-bottom: 0;
    }

    .detail-label {
      color: #666;
    }

    .detail-value {
      font-weight: 500;
      color: #333;
    }

    .total-amount {
      font-size: 16px;
      font-weight: 700;
      color: #0B4F6C;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #eee;
      text-align: right;
    }

    .quote-footer {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }

    .quote-btn {
      flex: 1;
      padding: 10px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }

    .quote-btn.primary {
      background: #0B4F6C;
      color: white;
    }

    .quote-btn.secondary {
      background: #f0f0f0;
      color: #333;
    }

    .quote-btn.danger {
      background: #ffebee;
      color: #f44336;
    }

    .quote-btn:active {
      transform: scale(0.96);
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #999;
    }

    .empty-state i {
      font-size: 48px;
      margin-bottom: 16px;
      color: #ddd;
    }

    .empty-state h3 {
      font-size: 18px;
      color: #666;
      margin-bottom: 8px;
    }

    .empty-state p {
      font-size: 14px;
    }

    /* Loading State */
    .loading-state {
      text-align: center;
      padding: 60px 20px;
      color: #999;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #eee;
      border-top-color: #0B4F6C;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.6);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal.show {
      display: flex;
    }

    .modal-content {
      background: white;
      border-radius: 20px;
      width: 100%;
      max-width: 400px;
      max-height: 85vh;
      overflow-y: auto;
    }

    .modal-header {
      padding: 20px;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      background: white;
    }

    .modal-header h3 {
      font-size: 18px;
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: #999;
    }

    .modal-body {
      padding: 20px;
    }

    .modal-footer {
      padding: 16px 20px;
      border-top: 1px solid #eee;
      display: flex;
      gap: 12px;
    }

    /* Form Elements in Modal */
    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #333;
      margin-bottom: 6px;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      font-size: 14px;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #0B4F6C;
    }

    .items-list {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 16px;
    }

    .quote-item {
      border-bottom: 1px solid #eee;
      padding: 12px 0;
    }

    .quote-item:last-child {
      border-bottom: none;
    }

    .item-name {
      font-weight: 500;
      margin-bottom: 8px;
    }

    .item-row {
      display: flex;
      gap: 12px;
    }

    .item-row input {
      flex: 1;
      padding: 8px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-size: 13px;
    }

    .add-item-btn {
      width: 100%;
      padding: 12px;
      background: white;
      border: 1px dashed #0B4F6C;
      border-radius: 30px;
      color: #0B4F6C;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 16px;
    }

    .quote-summary {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 16px;
      margin-top: 16px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .summary-row.total {
      font-weight: 700;
      font-size: 16px;
      color: #0B4F6C;
      border-top: 1px solid #eee;
      padding-top: 8px;
      margin-top: 8px;
    }

    .btn-primary {
      background: #0B4F6C;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      flex: 1;
    }

    .btn-secondary {
      background: #f0f0f0;
      color: #333;
      border: none;
      padding: 12px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      flex: 1;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 20px;
      right: 20px;
      background: #333;
      color: white;
      padding: 12px 20px;
      border-radius: 30px;
      font-size: 14px;
      text-align: center;
      z-index: 300;
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    .toast.success {
      background: #4caf50;
    }

    .toast.error {
      background: #ff4444;
    }
  </style>
</head>

<body>

<div class="container">
  <!-- Header -->
  <div class="header">
    <div class="header-content">
      <button class="back-btn" onclick="window.history.back()">
        <i class="fas fa-arrow-left"></i>
      </button>
      <div class="logo">
        <div class="logo-icon">B</div>
        <span class="logo-text">My Quotes</span>
      </div>
      <div style="width: 32px;"></div>
    </div>
  </div>

  <!-- Stats Row -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-number" id="totalCount">0</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="draftCount">0</div>
      <div class="stat-label">Drafts</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="sentCount">0</div>
      <div class="stat-label">Sent</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="acceptedCount">0</div>
      <div class="stat-label">Accepted</div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" data-tab="all">All</button>
    <button class="tab" data-tab="draft">Drafts</button>
    <button class="tab" data-tab="sent">Sent</button>
    <button class="tab" data-tab="accepted">Accepted</button>
  </div>

  <!-- Quote List -->
  <div class="quote-list" id="quoteList"></div>

  <!-- Loading State -->
  <div class="loading-state" id="loadingState">
    <div class="spinner"></div>
    <p>Loading your quotes...</p>
  </div>

  <!-- Empty State -->
  <div class="empty-state" id="emptyState" style="display: none;">
    <i class="fas fa-file-invoice"></i>
    <h3>No Quotes Yet</h3>
    <p>Browse RFQs and create your first quote</p>
    <button class="quote-btn primary" style="margin-top: 16px; padding: 12px 24px;" onclick="location.href='browse-rfqs.html'">
      Browse RFQs
    </button>
  </div>

  <!-- Create/Edit Quote Modal -->
  <div class="modal" id="quoteModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modalTitle">Create Quotation</h3>
        <button class="modal-close" onclick="closeQuoteModal()">&times;</button>
      </div>
      <div class="modal-body" id="modalBody">
        <!-- Dynamic form content -->
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="closeQuoteModal()">Cancel</button>
        <button class="btn-primary" id="saveDraftBtn">Save Draft</button>
        <button class="btn-primary" id="sendQuoteBtn">Send Quote</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supplier-quotations.js"></script>
</body>
</html>
