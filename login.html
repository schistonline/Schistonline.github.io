<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>Sign In - Buy Uganda B2B Marketplace</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #0B4F6C;
      --primary-dark: #083b4f;
      --primary-light: #1a6b8a;
      --primary-gradient: linear-gradient(135deg, #0B4F6C 0%, #1a6b8a 100%);
      --success: #10B981;
      --danger: #EF4444;
      --warning: #F59E0B;
      --gray-50: #F9FAFB;
      --gray-100: #F3F4F6;
      --gray-200: #E5E7EB;
      --gray-300: #D1D5DB;
      --gray-400: #9CA3AF;
      --gray-500: #6B7280;
      --gray-600: #4B5563;
      --gray-700: #374151;
      --gray-800: #1F2937;
      --gray-900: #111827;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: var(--primary-gradient);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 16px;
    }

    .container {
      width: 100%;
      max-width: 440px;
    }

    .card {
      background: white;
      border-radius: 28px;
      padding: 32px 28px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    }

    .logo {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo h1 {
      font-size: 28px;
      font-weight: 700;
      background: var(--primary-gradient);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
    }

    .logo p {
      color: var(--gray-500);
      font-size: 13px;
      margin-top: 6px;
    }

    .brand-badge {
      display: inline-block;
      background: var(--gray-100);
      color: var(--gray-600);
      font-size: 12px;
      padding: 6px 14px;
      border-radius: 30px;
      margin-bottom: 24px;
      text-align: center;
      width: 100%;
    }

    .google-btn {
      width: 100%;
      padding: 14px;
      background: white;
      color: var(--gray-700);
      border: 2px solid var(--gray-300);
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .google-btn:hover {
      background: var(--gray-50);
      border-color: var(--gray-400);
      transform: translateY(-1px);
    }

    .google-btn:active {
      transform: scale(0.98);
    }

    .google-btn img {
      width: 20px;
      height: 20px;
    }

    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 20px 0;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid var(--gray-200);
    }

    .divider span {
      padding: 0 10px;
      color: var(--gray-500);
      font-size: 12px;
    }

    .register-link {
      text-align: center;
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid var(--gray-200);
    }

    .register-link p {
      color: var(--gray-600);
      font-size: 14px;
    }

    .register-link a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    .register-link a:hover {
      text-decoration: underline;
    }

    .alert {
      padding: 12px 16px;
      border-radius: 14px;
      margin-bottom: 24px;
      font-size: 14px;
      display: none;
      animation: fadeIn 0.3s ease;
    }

    .alert.show {
      display: block;
    }

    .alert-error {
      background: #FEF2F2;
      color: #991B1B;
      border-left: 4px solid var(--danger);
    }

    .alert-success {
      background: #ECFDF5;
      color: #065F46;
      border-left: 4px solid var(--success);
    }

    .alert-info {
      background: #EFF6FF;
      color: #1E40AF;
      border-left: 4px solid var(--primary);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .legal-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: rgba(255,255,255,0.8);
    }

    .legal-footer p {
      margin-bottom: 8px;
    }

    .legal-footer a {
      color: rgba(255,255,255,0.9);
      text-decoration: none;
    }

    .legal-footer a:hover {
      text-decoration: underline;
    }

    .security-note {
      background: var(--gray-50);
      border-radius: 12px;
      padding: 10px 14px;
      margin-top: 16px;
      font-size: 11px;
      color: var(--gray-500);
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    @media (max-width: 480px) {
      .card {
        padding: 24px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="logo">
        <h1>Buy Uganda</h1>
        <p>Uganda's Premier B2B Marketplace</p>
      </div>

      <div class="brand-badge">
        🇺🇬 Trusted by 5,000+ Ugandan Businesses 🇺🇬
      </div>

      <div id="alert" class="alert"></div>

      <!-- Google Sign In Button -->
      <button id="googleSignInBtn" class="google-btn">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
        Continue with Google
      </button>

      <div class="register-link">
        <p>New to Buy Uganda? <a href="register.html">Create Business Account</a></p>
      </div>

      <div class="security-note">
        <span>🔒</span>
        <span>Your data is encrypted and secure. We never share your information.</span>
      </div>
    </div>

    <div class="legal-footer">
      <p>© 2026 Buy Uganda. All rights reserved.</p>
      <p>
        <a href="terms.html">Terms of Service</a> | 
        <a href="privacy.html">Privacy Policy</a> | 
        <a href="contact.html">Contact Us</a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      
      // Supabase Configuration
      const SUPABASE_URL = 'https://uufhvmmgwzkxvvdbqemz.supabase.co';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV1Zmh2bW1nd3preHZ2ZGJxZW16Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAzMDIzNTYsImV4cCI6MjA4NTg3ODM1Nn0.WABHx4ilFRkhPHP-y4ZC4E8Kb7PRqY-cyxI8cVS8Tyc';

      // Initialize Supabase client
      const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
        auth: {
          autoRefreshToken: true,
          persistSession: true,
          detectSessionInUrl: true,
          storage: localStorage
        }
      });

      // DOM Elements
      const googleBtn = document.getElementById('googleSignInBtn');
      const alertDiv = document.getElementById('alert');

      function showAlert(message, type = 'error') {
        alertDiv.textContent = message;
        alertDiv.className = `alert alert-${type} show`;
        if (type !== 'error') {
          setTimeout(() => alertDiv.classList.remove('show'), 5000);
        }
      }

      function setLoading(isLoading) {
        googleBtn.disabled = isLoading;
        googleBtn.innerHTML = isLoading ? 
          '<span class="spinner"></span> Signing in...' : 
          '<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google"> Continue with Google';
      }

      async function getUserRole(userId) {
        try {
          const { data: profile, error } = await supabase
            .from('profiles')
            .select('is_supplier, is_admin')
            .eq('id', userId)
            .single();

          if (error) return 'buyer';
          if (profile?.is_admin === true) return 'admin';
          if (profile?.is_supplier === true) return 'supplier';
          return 'buyer';
        } catch (err) {
          return 'buyer';
        }
      }

      async function redirectToDashboard(userId) {
        const role = await getUserRole(userId);
        const dashboards = {
          admin: 'admin-dashboard.html',
          supplier: 'supplier-dashboard.html',
          buyer: 'index.html'
        };
        window.location.href = dashboards[role] || 'index.html';
      }

      async function checkExistingSession() {
        try {
          const { data: { session } } = await supabase.auth.getSession();
          if (session?.user) {
            showAlert('Already logged in. Redirecting...', 'success');
            setTimeout(() => redirectToDashboard(session.user.id), 1500);
          }
        } catch (err) {
          console.error('Session check error:', err);
        }
      }

      async function handleGoogleSignIn() {
        setLoading(true);
        
        try {
          const { data, error } = await supabase.auth.signInWithOAuth({
            provider: 'google',
            options: {
              redirectTo: `${window.location.origin}/login.html`,
              queryParams: {
                access_type: 'offline',
                prompt: 'consent',
              }
            }
          });

          if (error) {
            console.error('Google sign in error:', error);
            showAlert(error.message || 'Failed to sign in with Google', 'error');
            setLoading(false);
          }
          // Note: When using signInWithOAuth, the page will redirect to Google
          // No need to handle loading state further as page will redirect
          
        } catch (err) {
          console.error('Google sign in exception:', err);
          showAlert('Network error. Please try again.', 'error');
          setLoading(false);
        }
      }

      // Handle OAuth callback
      async function handleOAuthCallback() {
        try {
          // Check if we have a hash fragment or query params from OAuth
          const { data: { session }, error } = await supabase.auth.getSession();
          
          if (error) {
            console.error('Session error:', error);
            return;
          }

          if (session?.user) {
            // Check if profile exists, if not, create it
            const { data: profile, error: profileError } = await supabase
              .from('profiles')
              .select('*')
              .eq('id', session.user.id)
              .single();

            if (profileError && profileError.code === 'PGRST116') {
              // Profile doesn't exist, create it
              const userMetadata = session.user.user_metadata;
              await supabase
                .from('profiles')
                .insert([{
                  id: session.user.id,
                  full_name: userMetadata.full_name || userMetadata.name,
                  account_type: 'buyer', // Default account type
                  is_supplier: false,
                  is_admin: false
                }]);
            }
            
            showAlert('Login successful! Redirecting...', 'success');
            setTimeout(() => redirectToDashboard(session.user.id), 1000);
          }
        } catch (err) {
          console.error('OAuth callback error:', err);
        }
      }

      // Check for OAuth callback on page load
      if (window.location.hash || window.location.search.includes('code')) {
        handleOAuthCallback();
      }

      // Setup event listeners
      googleBtn.addEventListener('click', handleGoogleSignIn);

      // Check existing session
      checkExistingSession();
      
    });
  </script>
</body>
</html>
