<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>Buy Uganda - Sign In</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #2563EB;
      --primary-dark: #1D4ED8;
      --primary-light: #60A5FA;
      --success: #10B981;
      --danger: #EF4444;
      --warning: #F59E0B;
      --gray-50: #F9FAFB;
      --gray-100: #F3F4F6;
      --gray-200: #E5E7EB;
      --gray-300: #D1D5DB;
      --gray-400: #9CA3AF;
      --gray-500: #6B7280;
      --gray-600: #4B5563;
      --gray-700: #374151;
      --gray-800: #1F2937;
      --gray-900: #111827;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #667EEA 0%, #764BA2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 16px;
    }

    .container {
      width: 100%;
      max-width: 440px;
    }

    .card {
      background: white;
      border-radius: 24px;
      padding: 32px 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo h1 {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, #667EEA 0%, #764BA2 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
    }

    .logo p {
      color: var(--gray-500);
      font-size: 14px;
      margin-top: 8px;
    }

    .brand-badge {
      display: inline-block;
      background: var(--gray-100);
      color: var(--gray-600);
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 24px;
      text-align: center;
      width: 100%;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: var(--gray-700);
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--gray-300);
      border-radius: 12px;
      font-size: 16px;
      transition: all 0.2s;
      background: white;
    }

    input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    input.error {
      border-color: var(--danger);
    }

    .error-message {
      color: var(--danger);
      font-size: 12px;
      margin-top: 6px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .checkbox {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .checkbox input {
      width: 18px;
      height: 18px;
      margin: 0;
    }

    .checkbox label {
      margin: 0;
      font-size: 14px;
      font-weight: normal;
    }

    .forgot-link {
      font-size: 14px;
      color: var(--primary);
      text-decoration: none;
    }

    .forgot-link:hover {
      text-decoration: underline;
    }

    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667EEA 0%, #764BA2 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    button:active {
      transform: scale(0.98);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .register-link {
      text-align: center;
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid var(--gray-200);
    }

    .register-link p {
      color: var(--gray-600);
      font-size: 14px;
    }

    .register-link a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    .register-link a:hover {
      text-decoration: underline;
    }

    .alert {
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 24px;
      font-size: 14px;
      display: none;
    }

    .alert.show {
      display: block;
    }

    .alert-error {
      background: #FEF2F2;
      color: #991B1B;
      border-left: 4px solid var(--danger);
    }

    .alert-success {
      background: #ECFDF5;
      color: #065F46;
      border-left: 4px solid var(--success);
    }

    .alert-info {
      background: #EFF6FF;
      color: #1E40AF;
      border-left: 4px solid var(--primary);
    }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .legal-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: rgba(255,255,255,0.7);
    }

    .legal-footer a {
      color: rgba(255,255,255,0.9);
      text-decoration: none;
    }

    .legal-footer a:hover {
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      .card {
        padding: 24px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="logo">
        <h1>Buy Uganda</h1>
        <p>Uganda's Premier B2B Marketplace</p>
      </div>

      <div class="brand-badge">
        🇺🇬 Connecting Ugandan Businesses 🇺🇬
      </div>

      <div id="alert" class="alert"></div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            placeholder="you@company.com"
            autocomplete="email"
            required
          />
          <div id="emailError" class="error-message"></div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            placeholder="Enter your password"
            autocomplete="current-password"
            required
          />
          <div id="passwordError" class="error-message"></div>
        </div>

        <div class="checkbox-group">
          <label class="checkbox">
            <input type="checkbox" id="rememberMe" />
            <span>Remember me</span>
          </label>
          <a href="forgot-password.html" class="forgot-link">Forgot password?</a>
        </div>

        <button type="submit" id="loginBtn">
          Sign In
        </button>
      </form>

      <div class="register-link">
        <p>Don't have an account? <a href="register.html">Create Business Account</a></p>
      </div>
    </div>

    <div class="legal-footer">
      <p>© 2026 Buy Uganda. All rights reserved.</p>
      <p>
        <a href="terms.html">Terms of Service</a> | 
        <a href="privacy.html">Privacy Policy</a> | 
        <a href="contact.html">Contact Us</a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    (function() {
      // ============================================
      // SUPABASE CONFIGURATION
      // ============================================
      const SUPABASE_URL = 'https://uufhvmmgwzkxvvdbqemz.supabase.co';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV1Zmh2bW1nd3preHZ2ZGJxZW16Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAzMDIzNTYsImV4cCI6MjA4NTg3ODM1Nn0.WABHx4ilFRkhPHP-y4ZC4E8Kb7PRqY-cyxI8cVS8Tyc';

      // ============================================
      // DOM ELEMENTS
      // ============================================
      const form = document.getElementById('loginForm');
      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const rememberMeCheckbox = document.getElementById('rememberMe');
      const loginBtn = document.getElementById('loginBtn');
      const alertDiv = document.getElementById('alert');
      const emailError = document.getElementById('emailError');
      const passwordError = document.getElementById('passwordError');

      // Initialize Supabase
      const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
        auth: {
          autoRefreshToken: true,
          persistSession: true,
          detectSessionInUrl: true
        }
      });

      // ============================================
      // HELPER FUNCTIONS
      // ============================================
      function showAlert(message, type = 'error') {
        alertDiv.textContent = message;
        alertDiv.className = `alert alert-${type} show`;
        
        // Auto-hide after 5 seconds for success/info messages
        if (type !== 'error') {
          setTimeout(() => {
            alertDiv.classList.remove('show');
          }, 5000);
        }
      }

      function clearErrors() {
        emailError.textContent = '';
        emailError.classList.remove('show');
        passwordError.textContent = '';
        passwordError.classList.remove('show');
        emailInput.classList.remove('error');
        passwordInput.classList.remove('error');
      }

      function showFieldError(field, message) {
        if (field === 'email') {
          emailError.textContent = message;
          emailError.classList.add('show');
          emailInput.classList.add('error');
        } else if (field === 'password') {
          passwordError.textContent = message;
          passwordError.classList.add('show');
          passwordInput.classList.add('error');
        }
      }

      function validateEmail(email) {
        const re = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
        return re.test(email);
      }

      function setLoading(isLoading) {
        if (isLoading) {
          loginBtn.disabled = true;
          loginBtn.innerHTML = '<span class="spinner"></span> Signing in...';
        } else {
          loginBtn.disabled = false;
          loginBtn.innerHTML = 'Sign In';
        }
      }

      // ============================================
      // GET USER PROFILE DATA (for dashboard redirect)
      // ============================================
      async function getUserRole(userId) {
        try {
          // First try to get from profiles table
          const { data: profile, error } = await supabase
            .from('profiles')
            .select('is_supplier, is_admin')
            .eq('id', userId)
            .single();

          if (error && error.code !== 'PGRST116') {
            console.error('Profile fetch error:', error);
          }

          if (profile) {
            if (profile.is_admin) return 'admin';
            if (profile.is_supplier) return 'supplier';
            return 'buyer';
          }

          // Check if user has any supplier-related data
          const { data: negotiations } = await supabase
            .from('negotiations')
            .select('id')
            .eq('supplier_id', userId)
            .limit(1);

          if (negotiations && negotiations.length > 0) {
            return 'supplier';
          }

          return 'buyer';
        } catch (err) {
          console.error('Error getting user role:', err);
          return 'buyer';
        }
      }

      // ============================================
      // REDIRECT BASED ON USER ROLE
      // ============================================
      async function redirectToDashboard(userId) {
        const role = await getUserRole(userId);
        
        const dashboards = {
          admin: '/admin/dashboard.html',
          supplier: '/supplier/dashboard.html',
          buyer: '/buyer/dashboard.html'
        };
        
        const redirectUrl = dashboards[role] || '/dashboard.html';
        
        // Check if there's a return URL parameter
        const urlParams = new URLSearchParams(window.location.search);
        const returnTo = urlParams.get('return_to');
        
        if (returnTo && returnTo.startsWith('/')) {
          window.location.href = returnTo;
        } else {
          window.location.href = redirectUrl;
        }
      }

      // ============================================
      // HANDLE SESSION PERSISTENCE
      // ============================================
      function saveSessionPreference(email) {
        if (rememberMeCheckbox.checked) {
          localStorage.setItem('saved_email', email);
          localStorage.setItem('remember_me', 'true');
        } else {
          localStorage.removeItem('saved_email');
          localStorage.setItem('remember_me', 'false');
        }
      }

      function loadSavedEmail() {
        const savedEmail = localStorage.getItem('saved_email');
        const rememberMe = localStorage.getItem('remember_me') === 'true';
        
        if (savedEmail && rememberMe) {
          emailInput.value = savedEmail;
          rememberMeCheckbox.checked = true;
        }
      }

      // ============================================
      // CHECK EXISTING SESSION
      // ============================================
      async function checkExistingSession() {
        try {
          const { data: { session }, error } = await supabase.auth.getSession();
          
          if (error) {
            console.error('Session check error:', error);
            return;
          }
          
          if (session?.user) {
            // User is already logged in, redirect to dashboard
            showAlert('You are already logged in. Redirecting...', 'success');
            setTimeout(() => {
              redirectToDashboard(session.user.id);
            }, 1500);
          }
        } catch (err) {
          console.error('Session check error:', err);
        }
      }

      // ============================================
      // LOGIN HANDLER
      // ============================================
      async function handleLogin(event) {
        event.preventDefault();
        
        // Clear previous errors
        clearErrors();
        
        const email = emailInput.value.trim();
        const password = passwordInput.value;
        
        // Validation
        let hasError = false;
        
        if (!email) {
          showFieldError('email', 'Email address is required');
          hasError = true;
        } else if (!validateEmail(email)) {
          showFieldError('email', 'Please enter a valid email address');
          hasError = true;
        }
        
        if (!password) {
          showFieldError('password', 'Password is required');
          hasError = true;
        }
        
        if (hasError) {
          return;
        }
        
        setLoading(true);
        
        try {
          // Attempt sign in
          const { data, error } = await supabase.auth.signInWithPassword({
            email: email,
            password: password
          });
          
          if (error) {
            // Handle specific error cases
            if (error.message.includes('Invalid login credentials')) {
              showAlert('Invalid email or password. Please try again.', 'error');
              showFieldError('password', 'Incorrect password');
            } else if (error.message.includes('Email not confirmed')) {
              showAlert('Please verify your email address before logging in. Check your inbox for the confirmation link.', 'info');
            } else {
              showAlert(error.message, 'error');
            }
            setLoading(false);
            return;
          }
          
          // Login successful
          if (data?.user) {
            // Save session preference
            saveSessionPreference(email);
            
            // Show success message
            showAlert('Login successful! Redirecting to your dashboard...', 'success');
            
            // Redirect to appropriate dashboard
            setTimeout(() => {
              redirectToDashboard(data.user.id);
            }, 1000);
          }
          
        } catch (err) {
          console.error('Login error:', err);
          showAlert('Network error. Please check your connection and try again.', 'error');
          setLoading(false);
        }
      }

      // ============================================
      // PASSWORD VISIBILITY TOGGLE (optional)
      // ============================================
      function addPasswordToggle() {
        const container = passwordInput.parentElement;
        const toggleBtn = document.createElement('button');
        toggleBtn.type = 'button';
        toggleBtn.textContent = '👁️';
        toggleBtn.style.cssText = `
          position: absolute;
          right: 12px;
          top: 50%;
          transform: translateY(-50%);
          background: none;
          border: none;
          cursor: pointer;
          padding: 4px;
          font-size: 16px;
          opacity: 0.6;
          width: auto;
        `;
        
        // Make container relative
        container.style.position = 'relative';
        container.appendChild(toggleBtn);
        
        toggleBtn.addEventListener('click', () => {
          const type = passwordInput.type === 'password' ? 'text' : 'password';
          passwordInput.type = type;
          toggleBtn.textContent = type === 'password' ? '👁️' : '🙈';
        });
      }

      // ============================================
      // INITIALIZATION
      // ============================================
      document.addEventListener('DOMContentLoaded', () => {
        loadSavedEmail();
        checkExistingSession();
        // addPasswordToggle(); // Uncomment to add password visibility toggle
        
        // Check for registration success message
        const urlParams = new URLSearchParams(window.location.search);
        const registered = urlParams.get('registered');
        const verified = urlParams.get('verified');
        
        if (registered === 'success') {
          showAlert('Account created successfully! Please check your email to verify your account.', 'success');
        } else if (verified === 'true') {
          showAlert('Email verified successfully! You can now log in.', 'success');
        }
      });
      
      // Event listeners
      form.addEventListener('submit', handleLogin);
      
      // Clear error on input
      emailInput.addEventListener('input', () => {
        emailInput.classList.remove('error');
        emailError.classList.remove('show');
      });
      
      passwordInput.addEventListener('input', () => {
        passwordInput.classList.remove('error');
        passwordError.classList.remove('show');
      });
      
    })();
  </script>
</body>
</html>
