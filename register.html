<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>Sign Up - Buy Uganda B2B Marketplace</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #0B4F6C;
      --primary-dark: #083b4f;
      --primary-light: #1a6b8a;
      --primary-gradient: linear-gradient(135deg, #0B4F6C 0%, #1a6b8a 100%);
      --success: #10B981;
      --danger: #EF4444;
      --gray-50: #F9FAFB;
      --gray-100: #F3F4F6;
      --gray-200: #E5E7EB;
      --gray-300: #D1D5DB;
      --gray-400: #9CA3AF;
      --gray-500: #6B7280;
      --gray-600: #4B5563;
      --gray-700: #374151;
      --gray-800: #1F2937;
      --border-radius: 16px;
      --border-radius-sm: 12px;
      --shadow-lg: 0 25px 50px -12px rgba(0,0,0,0.25);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: var(--primary-gradient);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 16px;
    }

    .container { width: 100%; max-width: 400px; }
    .card {
      background: white;
      border-radius: 28px;
      padding: 32px 28px;
      box-shadow: var(--shadow-lg);
    }

    .logo {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo h1 {
      font-size: 28px;
      font-weight: 700;
      background: var(--primary-gradient);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .logo p {
      color: var(--gray-500);
      font-size: 13px;
      margin-top: 4px;
    }

    .brand-badge {
      display: inline-block;
      background: var(--gray-100);
      color: var(--gray-600);
      font-size: 12px;
      padding: 6px 14px;
      border-radius: 30px;
      margin-bottom: 24px;
      text-align: center;
      width: 100%;
    }

    .alert {
      padding: 12px 16px;
      border-radius: var(--border-radius-sm);
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
    }

    .alert.show { display: block; }
    .alert-error { background: #FEF2F2; color: #991B1B; border-left: 4px solid #EF4444; }
    .alert-success { background: #ECFDF5; color: #065F46; border-left: 4px solid #10B981; }
    .alert-info { background: #EFF6FF; color: #1E40AF; border-left: 4px solid #0B4F6C; }

    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--gray-700);
      margin-bottom: 6px;
    }

    .form-input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid var(--gray-200);
      border-radius: var(--border-radius-sm);
      font-size: 15px;
      transition: all 0.2s;
      background: var(--gray-50);
      color: var(--gray-800);
    }

    .form-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(11, 79, 108, 0.1);
      background: white;
    }

    .form-input.error {
      border-color: var(--danger);
      box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.1);
    }

    .password-wrapper {
      position: relative;
    }

    .password-wrapper .form-input {
      padding-right: 48px;
    }

    .password-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--gray-400);
      cursor: pointer;
      font-size: 18px;
      padding: 4px;
    }

    .password-toggle:hover {
      color: var(--gray-600);
    }

    .btn {
      width: 100%;
      padding: 14px;
      border-radius: var(--border-radius-sm);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.7; cursor: not-allowed; }

    .btn-primary {
      background: var(--primary-gradient);
      color: white;
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(11, 79, 108, 0.3);
    }

    .btn-google {
      background: white;
      color: var(--gray-700);
      border: 2px solid var(--gray-300);
    }

    .btn-google:hover:not(:disabled) {
      background: var(--gray-50);
      border-color: var(--gray-400);
      transform: translateY(-1px);
    }

    .btn-google img {
      width: 20px;
      height: 20px;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 20px 0;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--gray-200);
    }

    .divider span {
      color: var(--gray-400);
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
    }

    .login-link {
      text-align: center;
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid var(--gray-200);
    }

    .login-link p {
      color: var(--gray-600);
      font-size: 14px;
    }

    .login-link a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    .login-link a:hover {
      text-decoration: underline;
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .security-note {
      background: var(--gray-50);
      border-radius: var(--border-radius-sm);
      padding: 10px 14px;
      margin-top: 16px;
      font-size: 12px;
      color: var(--gray-500);
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .legal-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: rgba(255,255,255,0.8);
    }

    .legal-footer a {
      color: rgba(255,255,255,0.9);
      text-decoration: none;
    }

    .legal-footer a:hover {
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      .card { padding: 24px 20px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="logo">
        <h1>Buy Uganda</h1>
        <p>Uganda's Premier B2B Marketplace</p>
      </div>

      <div class="brand-badge">🇺🇬 Join 5,000+ Ugandan Businesses 🇺🇬</div>

      <div id="alert" class="alert"></div>

      <form id="registerForm" onsubmit="return false;">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" class="form-input" placeholder="you@example.com" autocomplete="email" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input type="password" id="password" class="form-input" placeholder="Create a password" autocomplete="new-password" required minlength="6">
            <button type="button" class="password-toggle" id="passwordToggle">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <div class="password-wrapper">
            <input type="password" id="confirmPassword" class="form-input" placeholder="Confirm your password" autocomplete="new-password" required>
            <button type="button" class="password-toggle" id="confirmPasswordToggle">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <button type="submit" id="emailSignUpBtn" class="btn btn-primary">Create Account</button>
      </form>

      <div class="divider"><span>or</span></div>

      <button id="googleSignUpBtn" class="btn btn-google">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
        Continue with Google
      </button>

      <div class="login-link">
        <p>Already have an account? <a href="login.html">Sign in</a></p>
      </div>

      <div class="security-note">
        <span>🔒</span>
        <span>Your data is encrypted and secure.</span>
      </div>
    </div>

    <div class="legal-footer">
      <p>© 2026 Buy Uganda. All rights reserved.</p>
      <p><a href="terms.html">Terms</a> | <a href="privacy.html">Privacy</a></p>
    </div>
  </div>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    (function() {
      const SUPABASE_URL = 'https://uufhvmmgwzkxvvdbqemz.supabase.co';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV1Zmh2bW1nd3preHZ2ZGJxZW16Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAzMDIzNTYsImV4cCI6MjA4NTg3ODM1Nn0.WABHx4ilFRkhPHP-y4ZC4E8Kb7PRqY-cyxI8cVS8Tyc';

      const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
        auth: { autoRefreshToken: true, persistSession: true, detectSessionInUrl: true, storage: localStorage }
      });

      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const confirmPasswordInput = document.getElementById('confirmPassword');
      const emailSignUpBtn = document.getElementById('emailSignUpBtn');
      const googleBtn = document.getElementById('googleSignUpBtn');
      const alertDiv = document.getElementById('alert');

      let isLoading = false;

      function showAlert(message, type = 'error') {
        alertDiv.textContent = message;
        alertDiv.className = `alert alert-${type} show`;
        clearTimeout(window.alertTimeout);
        window.alertTimeout = setTimeout(() => alertDiv.classList.remove('show'), 5000);
      }

      function setLoading(loading) {
        isLoading = loading;
        emailSignUpBtn.disabled = loading;
        googleBtn.disabled = loading;
        emailSignUpBtn.innerHTML = loading ? '<span class="spinner"></span> Creating account...' : 'Create Account';
      }

      function validateEmail(email) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
      }

      async function redirectToDashboard(userId) {
        try {
          const { data: profile } = await sb
            .from('profiles')
            .select('is_supplier, is_admin')
            .eq('id', userId)
            .single();

          if (profile?.is_admin) {
            window.location.href = 'admin-dashboard.html';
          } else if (profile?.is_supplier) {
            window.location.href = 'supplier-dashboard.html';
          } else {
            window.location.href = 'index.html';
          }
        } catch (err) {
          window.location.href = 'index.html';
        }
      }

      async function handleEmailSignUp(e) {
        e.preventDefault();
        if (isLoading) return;

        const email = emailInput.value.trim();
        const password = passwordInput.value;
        const confirmPassword = confirmPasswordInput.value;

        // Reset errors
        document.querySelectorAll('.error').forEach(el => el.classList.remove('error'));

        if (!email) {
          showAlert('Please enter your email address', 'error');
          emailInput.classList.add('error');
          emailInput.focus();
          return;
        }

        if (!validateEmail(email)) {
          showAlert('Please enter a valid email address', 'error');
          emailInput.classList.add('error');
          emailInput.focus();
          return;
        }

        if (!password) {
          showAlert('Please enter a password', 'error');
          passwordInput.classList.add('error');
          passwordInput.focus();
          return;
        }

        if (password.length < 6) {
          showAlert('Password must be at least 6 characters', 'error');
          passwordInput.classList.add('error');
          passwordInput.focus();
          return;
        }

        if (password !== confirmPassword) {
          showAlert('Passwords do not match', 'error');
          confirmPasswordInput.classList.add('error');
          confirmPasswordInput.focus();
          return;
        }

        setLoading(true);
        showAlert('Creating account...', 'info');

        try {
          const { data, error } = await sb.auth.signUp({
            email: email,
            password: password,
            options: {
              data: { full_name: email.split('@')[0] }
            }
          });

          if (error) throw error;

          if (!data.user) {
            throw new Error('Account creation failed');
          }

          // Check if profile exists, create if not
          const { data: profile } = await sb
            .from('profiles')
            .select('id')
            .eq('id', data.user.id)
            .single();

          if (!profile) {
            await sb
              .from('profiles')
              .insert({
                id: data.user.id,
                email: email,
                full_name: email.split('@')[0],
                is_buyer: true,
                is_supplier: false,
                is_admin: false,
                created_at: new Date().toISOString()
              });
          }

          showAlert('Account created! Redirecting...', 'success');
          setLoading(false);

          setTimeout(() => redirectToDashboard(data.user.id), 1500);

        } catch (err) {
          console.error('Signup error:', err);
          let message = 'Registration failed. Please try again.';
          if (err.message.includes('User already registered')) {
            message = 'Email already registered. Please sign in.';
          }
          showAlert(message, 'error');
          setLoading(false);
        }
      }

      async function handleGoogleSignUp() {
        if (isLoading) return;
        setLoading(true);

        try {
          const { error } = await sb.auth.signInWithOAuth({
            provider: 'google',
            options: {
              redirectTo: `${window.location.origin}/register.html`,
              queryParams: { access_type: 'offline', prompt: 'consent' }
            }
          });
          if (error) throw error;
        } catch (err) {
          showAlert(err.message || 'Failed to sign up with Google', 'error');
          setLoading(false);
        }
      }

      async function handleOAuthCallback() {
        try {
          const { data: { session }, error } = await sb.auth.getSession();
          if (error) throw error;
          if (!session?.user) {
            window.location.href = 'register.html';
            return;
          }

          // Check if profile exists
          const { data: profile } = await sb
            .from('profiles')
            .select('id')
            .eq('id', session.user.id)
            .single();

          if (!profile) {
            const metadata = session.user.user_metadata;
            await sb
              .from('profiles')
              .insert({
                id: session.user.id,
                email: session.user.email,
                full_name: metadata.full_name || metadata.name || session.user.email.split('@')[0],
                avatar_url: metadata.avatar_url || metadata.picture,
                is_buyer: true,
                is_supplier: false,
                is_admin: false,
                created_at: new Date().toISOString()
              });
          }

          showAlert('Account created! Redirecting...', 'success');
          setTimeout(() => redirectToDashboard(session.user.id), 1000);

        } catch (err) {
          console.error('OAuth error:', err);
          showAlert('Authentication failed. Please try again.', 'error');
          window.location.href = 'register.html';
        }
      }

      // Password toggle
      document.getElementById('passwordToggle').addEventListener('click', function() {
        const isPassword = passwordInput.type === 'password';
        passwordInput.type = isPassword ? 'text' : 'password';
        this.innerHTML = isPassword ? '<i class="fas fa-eye-slash"></i>' : '<i class="fas fa-eye"></i>';
      });

      document.getElementById('confirmPasswordToggle').addEventListener('click', function() {
        const isPassword = confirmPasswordInput.type === 'password';
        confirmPasswordInput.type = isPassword ? 'text' : 'password';
        this.innerHTML = isPassword ? '<i class="fas fa-eye-slash"></i>' : '<i class="fas fa-eye"></i>';
      });

      // Form submit
      document.getElementById('registerForm').addEventListener('submit', handleEmailSignUp);
      emailSignUpBtn.addEventListener('click', handleEmailSignUp);
      googleBtn.addEventListener('click', handleGoogleSignUp);

      // Enter key support
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
          const active = document.activeElement;
          if (active && active.tagName === 'INPUT') {
            const inputs = document.querySelectorAll('input:not([type="checkbox"])');
            const index = Array.from(inputs).indexOf(active);
            if (index < inputs.length - 1) {
              inputs[index + 1].focus();
              e.preventDefault();
            } else {
              handleEmailSignUp(e);
            }
          }
        }
      });

      // Check OAuth callback
      const isOAuthRedirect = window.location.hash || window.location.search.includes('code') || window.location.search.includes('access_token');

      if (isOAuthRedirect) {
        emailSignUpBtn.disabled = true;
        googleBtn.disabled = true;
        emailSignUpBtn.innerHTML = '<span class="spinner"></span> Completing sign up...';
        handleOAuthCallback();
      } else {
        // Check existing session
        sb.auth.getSession().then(({ data: { session } }) => {
          if (session?.user) {
            redirectToDashboard(session.user.id);
          }
        });
      }

      console.log('✅ Register page initialized');
    })();
  </script>
</body>
</html>
