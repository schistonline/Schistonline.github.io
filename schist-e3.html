<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>BuyUganda AI Assistant</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="css/ai-assistant.css">
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="header-title">
                <div class="ai-avatar">
                    <i class="fas fa-robot"></i>
                </div>
                <div>
                    <h1>BuyUganda Assistant</h1>
                    <p>AI | Marketplace Search</p>
                </div>
            </div>
            <button class="back-btn" onclick="window.location.href='index.html'">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <div class="messages-area" id="messagesArea">
            <div class="message message-assistant">
                <div class="assistant-avatar">
                    <i class="fas fa-robot"></i>
                </div>
                <div class="message-bubble">
                    Hello! I'm your BuyUganda shopping assistant. how can i help you today
                </div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <textarea class="chat-input" id="chatInput" placeholder="Search for products..." rows="1"></textarea>
                <div class="input-buttons">
                    <button class="mic-btn" id="micBtn">
                        <i class="fas fa-microphone"></i>
                    </button>
                    <button class="send-btn" id="sendBtn">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/ai-assistant.js"></script>
</body>
</html>
