<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Search Results - iBlue B2B</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #0B4F6C;
            --primary-dark: #083b4f;
            --secondary: #10B981;
            --accent: #F59E0B;
            --danger: #EF4444;
            --white: #FFFFFF;
            --black: #000000;
            --gray-100: #F3F4F6;
            --gray-200: #E5E7EB;
            --gray-300: #D1D5DB;
            --gray-400: #9CA3AF;
            --gray-500: #6B7280;
            --gray-600: #4B5563;
            --gray-700: #374151;
            --gray-800: #1F2937;
            --overlay: linear-gradient(0deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.4) 30%, rgba(0,0,0,0) 60%);
            --shadow: 0 2px 8px rgba(0,0,0,0.1);
            --shadow-lg: 0 4px 12px rgba(0,0,0,0.15);
            --radius: 16px;
            --radius-sm: 12px;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--black);
            color: white;
            height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }
        
        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.7) 50%, rgba(0,0,0,0) 100%);
            padding: 50px 16px 20px;
            z-index: 100;
        }
        
        .header-content {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        
        .back-btn {
            width: 44px;
            height: 44px;
            border: none;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .back-btn:active {
            background: var(--primary);
            transform: scale(0.95);
        }
        
        .search-container {
            flex: 1;
            position: relative;
        }
        
        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray-400);
            font-size: 16px;
            z-index: 2;
        }
        
        .search-input {
            width: 100%;
            padding: 14px 14px 14px 48px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 30px;
            font-size: 16px;
            outline: none;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            color: white;
            transition: all 0.2s;
        }
        
        .search-input::placeholder {
            color: var(--gray-400);
        }
        
        .search-input:focus {
            border-color: var(--primary);
            background: rgba(0,0,0,0.7);
        }
        
        .filter-toggle-btn {
            width: 44px;
            height: 44px;
            border: none;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: white;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .filter-toggle-btn.active {
            background: var(--primary);
        }
        
        /* Search Info */
        .search-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            color: var(--gray-300);
            padding: 8px 4px;
        }
        
        .search-query {
            font-weight: 600;
            color: var(--primary);
        }
        
        .search-results-count {
            background: rgba(255,255,255,0.1);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            backdrop-filter: blur(5px);
        }
        
        /* Filter Bar */
        .filter-bar {
            display: flex;
            gap: 8px;
            padding: 8px 0;
            overflow-x: auto;
            scrollbar-width: none;
        }
        
        .filter-bar::-webkit-scrollbar {
            display: none;
        }
        
        .filter-chip {
            padding: 8px 16px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            color: white;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .filter-chip:active {
            background: rgba(255,255,255,0.2);
        }
        
        .filter-chip.active {
            background: var(--primary);
            border-color: var(--primary);
        }
        
        /* Filter Panel */
        .filter-panel {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(20px);
            z-index: 200;
            padding: 80px 20px 20px;
            overflow-y: auto;
            display: none;
            animation: slideDown 0.3s ease;
        }
        
        .filter-panel.show {
            display: block;
        }
        
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .filter-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        
        .filter-header h3 {
            font-size: 20px;
            font-weight: 600;
        }
        
        .close-filter {
            width: 44px;
            height: 44px;
            border: none;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }
        
        .filter-section {
            margin-bottom: 30px;
        }
        
        .filter-section h4 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--gray-300);
        }
        
        .filter-select {
            width: 100%;
            padding: 14px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            color: white;
            font-size: 15px;
            outline: none;
        }
        
        .filter-select option {
            background: var(--gray-800);
        }
        
        .filter-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        
        .filter-option {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--gray-300);
            cursor: pointer;
        }
        
        .filter-option input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--primary);
        }
        
        .filter-actions {
            display: flex;
            gap: 12px;
            margin-top: 30px;
        }
        
        .apply-btn, .reset-btn {
            flex: 1;
            padding: 16px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            border: none;
        }
        
        .apply-btn {
            background: var(--primary);
            color: white;
        }
        
        .apply-btn:active {
            background: var(--primary-dark);
        }
        
        .reset-btn {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .reset-btn:active {
            background: rgba(255,255,255,0.2);
        }
        
        /* Video Feed Container */
        .feed-container {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
            margin-top: 120px;
        }
        
        .feed-container::-webkit-scrollbar {
            display: none;
        }
        
        /* Video Item */
        .video-item {
            height: 100vh;
            scroll-snap-align: start;
            position: relative;
            background: var(--black);
        }
        
        .video-wrapper {
            height: 100%;
            width: 100%;
            position: relative;
        }
        
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }
        
        /* Video Overlay */
        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--overlay);
            z-index: 2;
            pointer-events: none;
        }
        
        /* Play/Pause Indicator */
        .play-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 80px;
            color: rgba(255,255,255,0.8);
            z-index: 5;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        
        .play-indicator.show {
            opacity: 1;
        }
        
        /* Unmute Button */
        .unmute-btn {
            position: absolute;
            bottom: 140px;
            right: 16px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 20;
            backdrop-filter: blur(5px);
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
        }
        
        .unmute-btn:active {
            transform: scale(0.9);
            background: var(--primary);
            border-color: var(--primary);
        }
        
        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.4);
            }
            70% {
                box-shadow: 0 0 0 15px rgba(255, 255, 255, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(255, 255, 255, 0);
            }
        }
        
        .unmute-btn {
            animation: pulse 2s infinite;
        }
        
        /* Sound Wave */
        .sound-wave {
            position: absolute;
            bottom: 150px;
            right: 80px;
            display: flex;
            align-items: center;
            gap: 4px;
            z-index: 15;
            pointer-events: none;
        }
        
        .sound-wave span {
            width: 4px;
            height: 20px;
            background: white;
            border-radius: 4px;
            animation: wave 1s ease-in-out infinite;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        
        .sound-wave span:nth-child(2) {
            animation-delay: 0.2s;
            height: 30px;
        }
        
        .sound-wave span:nth-child(3) {
            animation-delay: 0.4s;
            height: 15px;
        }
        
        .sound-wave span:nth-child(4) {
            animation-delay: 0.1s;
            height: 25px;
        }
        
        @keyframes wave {
            0%, 100% {
                transform: scaleY(0.5);
                opacity: 0.5;
            }
            50% {
                transform: scaleY(1);
                opacity: 1;
            }
        }
        
        .sound-wave.hide {
            display: none;
        }
        
        /* Video Info */
        .video-info {
            position: absolute;
            bottom: 100px;
            left: 16px;
            right: 80px;
            z-index: 10;
            color: white;
        }
        
        .supplier-info {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            cursor: pointer;
            width: fit-content;
        }
        
        .supplier-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 18px;
            border: 2px solid white;
            overflow: hidden;
        }
        
        .supplier-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .supplier-name {
            font-weight: 600;
            font-size: 16px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        
        .product-name {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        
        .video-caption {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 16px;
            line-height: 1.5;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .inquiry-btn {
            background: var(--primary);
            border: none;
            color: white;
            padding: 14px 24px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(11, 79, 108, 0.4);
            transition: all 0.2s;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .inquiry-btn:active {
            transform: scale(0.95);
            background: var(--primary-dark);
        }
        
        /* Action Buttons */
        .action-buttons {
            position: absolute;
            right: 16px;
            bottom: 140px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            z-index: 10;
        }
        
        .action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        
        .action-btn i {
            font-size: 32px;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(5px);
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .action-btn i:active {
            transform: scale(1.1);
            background: var(--primary);
        }
        
        .action-btn.liked i {
            color: var(--danger);
        }
        
        .action-btn span {
            font-size: 13px;
            font-weight: 500;
            background: rgba(0,0,0,0.3);
            padding: 4px 8px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
        }
        
        /* Heart Pop Animation */
        @keyframes heartPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.4); color: var(--danger); }
            100% { transform: scale(1); }
        }
        
        .heart-pop {
            animation: heartPop 0.3s ease;
        }
        
        /* Loading State */
        .loading-state {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 20;
            color: white;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Empty State */
        .empty-state {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            width: 80%;
            max-width: 300px;
        }
        
        .empty-state i {
            font-size: 60px;
            color: var(--gray-500);
            margin-bottom: 16px;
        }
        
        .empty-state h3 {
            font-size: 20px;
            margin-bottom: 8px;
        }
        
        .empty-state p {
            font-size: 14px;
            color: var(--gray-400);
            margin-bottom: 24px;
        }
        
        .empty-suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }
        
        .suggestion-chip {
            padding: 10px 18px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 30px;
            font-size: 13px;
            color: white;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }
        
        .suggestion-chip:active {
            background: var(--primary);
        }
        
        /* Load More */
        .load-more {
            position: relative;
            text-align: center;
            padding: 20px 0;
            z-index: 10;
        }
        
        .load-more-btn {
            padding: 14px 30px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .load-more-btn:active {
            background: var(--primary);
        }
        
        .load-more-btn:disabled {
            opacity: 0.5;
            pointer-events: none;
        }
        
        /* Comments Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
            align-items: flex-end;
            justify-content: center;
        }
        
        .modal.show {
            display: flex;
        }
        
        .modal-content {
            background: rgba(20,20,20,0.95);
            border-radius: 20px 20px 0 0;
            width: 100%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        
        .modal-header {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: rgba(20,20,20,0.95);
            backdrop-filter: blur(20px);
            z-index: 10;
        }
        
        .modal-header h3 {
            font-size: 18px;
            font-weight: 600;
            color: white;
        }
        
        .modal-close {
            width: 40px;
            height: 40px;
            border: none;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        
        .modal-close:active {
            background: var(--danger);
        }
        
        .comments-list {
            padding: 20px;
            max-height: 60vh;
            overflow-y: auto;
        }
        
        .comment-item {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .comment-avatar {
            width: 40px;
            height: 40px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 16px;
            flex-shrink: 0;
            overflow: hidden;
        }
        
        .comment-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .comment-content {
            flex: 1;
        }
        
        .comment-name {
            font-weight: 600;
            font-size: 14px;
            color: white;
            margin-bottom: 4px;
        }
        
        .comment-text {
            font-size: 14px;
            color: var(--gray-300);
            margin-bottom: 4px;
            line-height: 1.5;
        }
        
        .comment-time {
            font-size: 11px;
            color: var(--gray-500);
        }
        
        .comment-input {
            display: flex;
            gap: 12px;
            padding: 16px 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            background: rgba(20,20,20,0.95);
            backdrop-filter: blur(20px);
        }
        
        .comment-input input {
            flex: 1;
            padding: 14px 18px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 30px;
            font-size: 14px;
            outline: none;
            background: rgba(255,255,255,0.1);
            color: white;
        }
        
        .comment-input input::placeholder {
            color: var(--gray-500);
        }
        
        .comment-input input:focus {
            border-color: var(--primary);
        }
        
        .comment-input button {
            width: 50px;
            height: 50px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .comment-input button:active {
            transform: scale(0.9);
            background: var(--primary-dark);
        }
        
        .comment-input button:disabled {
            opacity: 0.5;
            pointer-events: none;
        }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 14px 28px;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 500;
            z-index: 3000;
            opacity: 0;
            transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        
        .toast.success { background: var(--secondary); }
        .toast.error { background: var(--danger); }
        .toast.info { background: var(--primary); }
        
        /* Desktop Styles */
        @media (min-width: 768px) {
            body {
                max-width: 400px;
                margin: 0 auto;
                background: #1a1a1a;
            }
            
            .header {
                max-width: 400px;
                left: 50%;
                transform: translateX(-50%);
            }
            
            .feed-container {
                max-width: 400px;
                margin-left: auto;
                margin-right: auto;
            }
        }
        
        /* Safe Area */
        @supports (padding: max(0px)) {
            .header {
                padding-top: max(50px, env(safe-area-inset-top));
            }
            
            .video-info {
                bottom: max(100px, env(safe-area-inset-bottom));
            }
            
            .action-buttons {
                bottom: max(140px, env(safe-area-inset-bottom) + 140px);
            }
            
            .unmute-btn {
                bottom: max(140px, env(safe-area-inset-bottom) + 140px);
            }
            
            .toast {
                bottom: max(30px, env(safe-area-inset-bottom));
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-content">
            <button class="back-btn" onclick="window.history.back()">
                <i class="fas fa-arrow-left"></i>
            </button>
            
            <div class="search-container">
                <i class="fas fa-search search-icon"></i>
                <input type="text" class="search-input" id="searchInput" 
                       placeholder="Search videos...">
            </div>
            
            <button class="filter-toggle-btn" id="filterToggleBtn" onclick="SearchResults.toggleFilterPanel()">
                <i class="fas fa-sliders-h"></i>
            </button>
        </div>
        
        <!-- Search Info -->
        <div class="search-info">
            <div class="search-query-text">
                Results for "<span class="search-query" id="searchQuery">electronics</span>"
            </div>
            <div class="search-results-count" id="resultsCount">0 videos</div>
        </div>
        
        <!-- Filter Bar -->
        <div class="filter-bar" id="filterBar">
            <span class="filter-chip active" data-filter="relevance">Relevance</span>
            <span class="filter-chip" data-filter="latest">Latest</span>
            <span class="filter-chip" data-filter="popular">Most Popular</span>
            <span class="filter-chip" data-filter="liked">Most Liked</span>
            <span class="filter-chip" data-filter="viewed">Most Viewed</span>
        </div>
    </div>
    
    <!-- Filter Panel -->
    <div class="filter-panel" id="filterPanel">
        <div class="filter-header">
            <h3>Filter Results</h3>
            <button class="close-filter" onclick="SearchResults.toggleFilterPanel()">
                <i class="fas fa-times"></i>
            </button>
        </div>
        
        <div class="filter-section">
            <h4>Category</h4>
            <select class="filter-select" id="categoryFilter">
                <option value="all">All Categories</option>
                <option value="electronics">Electronics</option>
                <option value="fashion">Fashion</option>
                <option value="home">Home & Living</option>
                <option value="beauty">Beauty</option>
                <option value="sports">Sports</option>
                <option value="automotive">Automotive</option>
                <option value="food">Food & Beverages</option>
            </select>
        </div>
        
        <div class="filter-section">
            <h4>Duration</h4>
            <select class="filter-select" id="durationFilter">
                <option value="all">Any Duration</option>
                <option value="short">Under 30 seconds</option>
                <option value="medium">30-60 seconds</option>
                <option value="long">Over 60 seconds</option>
            </select>
        </div>
        
        <div class="filter-section">
            <h4>Date Posted</h4>
            <select class="filter-select" id="dateFilter">
                <option value="all">Any Time</option>
                <option value="today">Today</option>
                <option value="week">This Week</option>
                <option value="month">This Month</option>
                <option value="year">This Year</option>
            </select>
        </div>
        
        <div class="filter-section">
            <h4>Supplier Verification</h4>
            <div class="filter-options">
                <label class="filter-option">
                    <input type="checkbox" value="verified" id="verifiedFilter">
                    <span>Verified Suppliers Only</span>
                </label>
                <label class="filter-option">
                    <input type="checkbox" value="featured" id="featuredFilter">
                    <span>Featured Suppliers</span>
                </label>
            </div>
        </div>
        
        <div class="filter-section">
            <h4>Sort By</h4>
            <select class="filter-select" id="sortFilter">
                <option value="relevance">Relevance</option>
                <option value="latest">Latest First</option>
                <option value="popular">Most Popular</option>
                <option value="liked">Most Liked</option>
                <option value="viewed">Most Viewed</option>
            </select>
        </div>
        
        <div class="filter-actions">
            <button class="apply-btn" onclick="SearchResults.applyFilters()">Apply Filters</button>
            <button class="reset-btn" onclick="SearchResults.resetFilters()">Reset</button>
        </div>
    </div>
    
    <!-- Results Feed (TikTok Style) -->
    <div class="feed-container" id="feedContainer">
        <!-- Loading State -->
        <div class="loading-state" id="loadingState">
            <div class="spinner"></div>
            <p>Searching videos...</p>
        </div>
    </div>
    
    <!-- Empty State (hidden by default) -->
    <div class="empty-state" id="emptyState" style="display: none;">
        <i class="fas fa-video-slash"></i>
        <h3>No videos found</h3>
        <p>Try adjusting your search or filters</p>
        <div class="empty-suggestions">
            <span class="suggestion-chip" onclick="SearchResults.trySuggestion('electronics')">electronics</span>
            <span class="suggestion-chip" onclick="SearchResults.trySuggestion('fashion')">fashion</span>
            <span class="suggestion-chip" onclick="SearchResults.trySuggestion('home')">home decor</span>
            <span class="suggestion-chip" onclick="SearchResults.trySuggestion('trending')">trending</span>
        </div>
    </div>
    
    <!-- Load More -->
    <div class="load-more" id="loadMore" style="display: none;">
        <button class="load-more-btn" onclick="SearchResults.loadMoreResults()" id="loadMoreBtn">
            Load More Videos
        </button>
    </div>
    
    <!-- Comments Modal -->
    <div class="modal" id="commentsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Comments (<span id="commentCount">0</span>)</h3>
                <button class="modal-close" onclick="SearchResults.closeComments()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="comments-list" id="commentsList"></div>
            <div class="comment-input">
                <input type="text" id="commentInput" placeholder="Add a comment...">
                <button onclick="SearchResults.addComment()">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>
    
    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/search-results.js"></script>
</body>
</html>
