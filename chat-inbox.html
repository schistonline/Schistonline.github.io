<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chats - Schist.online</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #111B21;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .chat-header {
            background: #202C33;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #2A3942;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            background: none;
            border: none;
            color: #E9EDEF;
            font-size: 24px;
            cursor: pointer;
            display: none;
        }

        .chat-header h1 {
            color: #E9EDEF;
            font-size: 20px;
            font-weight: 600;
        }

        .header-actions {
            display: flex;
            gap: 20px;
        }

        .header-actions button {
            background: none;
            border: none;
            color: #E9EDEF;
            font-size: 20px;
            cursor: pointer;
        }

        /* Search Bar */
        .search-bar {
            background: #202C33;
            padding: 8px 16px;
        }

        .search-container {
            background: #2A3942;
            border-radius: 8px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .search-container i {
            color: #8696A0;
        }

        .search-container input {
            flex: 1;
            background: none;
            border: none;
            color: #E9EDEF;
            font-size: 15px;
            outline: none;
        }

        .search-container input::placeholder {
            color: #8696A0;
        }

        /* Conversations List */
        .conversations-list {
            flex: 1;
            overflow-y: auto;
            background: #111B21;
        }

        .conversation-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid #2A3942;
            text-decoration: none;
        }

        .conversation-item:hover {
            background: #2A3942;
        }

        .conversation-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6B21E5, #9B4DFF);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 20px;
            flex-shrink: 0;
            position: relative;
        }

        .online-indicator {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            background: #25D366;
            border-radius: 50%;
            border: 2px solid #111B21;
        }

        .conversation-info {
            flex: 1;
            min-width: 0;
        }

        .conversation-title {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 4px;
        }

        .conversation-name {
            font-weight: 600;
            color: #E9EDEF;
            font-size: 16px;
        }

        .conversation-time {
            font-size: 11px;
            color: #8696A0;
        }

        .conversation-preview {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .last-message {
            font-size: 13px;
            color: #8696A0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }

        .unread-badge {
            background: #25D366;
            color: #111B21;
            font-size: 11px;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 12px;
            min-width: 20px;
            text-align: center;
        }

        .muted-icon {
            color: #8696A0;
            font-size: 12px;
            margin-left: 4px;
        }

        /* Empty State */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            padding: 32px;
            color: #8696A0;
        }

        .empty-state i {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        /* Loading */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #8696A0;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #2A3942;
            border-top-color: #25D366;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .back-btn {
                display: block;
            }
        }
    </style>
</head>
<body>
    <div class="chat-header">
        <div class="header-title">
            <button class="back-btn" onclick="window.location.href='index.html'">
                <i class="fas fa-arrow-left"></i>
            </button>
            <h1>Chats</h1>
        </div>
        <div class="header-actions">
            <button onclick="openNewChat()">
                <i class="fas fa-edit"></i>
            </button>
            <button onclick="openSettings()">
                <i class="fas fa-ellipsis-v"></i>
            </button>
        </div>
    </div>

    <div class="search-bar">
        <div class="search-container">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search or start new chat">
        </div>
    </div>

    <div class="conversations-list" id="conversationsList">
        <div class="loading">
            <div class="loading-spinner"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/chat-inbox.js"></script>
</body>
</html>
