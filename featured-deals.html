<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Featured Deals - iBlue Uganda</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Add your styles here - similar to search-results.html */
        :root {
            --primary: #2563EB;
            --primary-dark: #1D4ED8;
            --danger: #EF4444;
            --dark: #1F2937;
            --gray-500: #6B7280;
            --gray-200: #E5E7EB;
            --gray-100: #F3F4F6;
            --white: #FFFFFF;
            --radius: 12px;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--gray-100);
            color: var(--dark);
            padding-bottom: 70px;
        }

        .header {
            background: var(--white);
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow);
        }

        .back-btn {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header h1 {
            font-size: 1.2rem;
            font-weight: 600;
            flex: 1;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 16px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        .product-card {
            background: var(--white);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            text-decoration: none;
            color: inherit;
        }

        .product-image {
            position: relative;
            padding-top: 75%;
            overflow: hidden;
        }

        .product-image img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-badge {
            position: absolute;
            top: 8px;
            left: 8px;
            background: var(--warning);
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .product-info { padding: 12px; }
        .product-title { font-size: 1rem; font-weight: 600; margin-bottom: 8px; }
        .product-price { font-size: 1.1rem; font-weight: 700; color: var(--primary); margin-bottom: 8px; }
        .product-meta { font-size: 0.8rem; color: var(--gray-500); }

        .loading {
            display: flex;
            justify-content: center;
            padding: 40px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(37,99,235,0.1);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-state i {
            font-size: 3rem;
            color: var(--gray-500);
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <header class="header">
        <button class="back-btn" onclick="window.history.back()">
            <i class="fas fa-arrow-left"></i>
        </button>
        <h1>⭐ Featured Deals</h1>
        <button class="back-btn" onclick="window.location.reload()">
            <i class="fas fa-redo"></i>
        </button>
    </header>

    <div class="container">
        <div class="products-grid" id="productsGrid"></div>
        <div class="loading" id="loading">
            <div class="spinner"></div>
        </div>
        <div class="empty-state" id="emptyState" style="display: none;">
            <i class="fas fa-star"></i>
            <h3>No Featured Deals</h3>
            <p>Check back later for featured items</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const sb = window.supabase.createClient(
            'https://uufhvmmgwzkxvvdbqemz.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV1Zmh2bW1nd3preHZ2ZGJxZW16Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAzMDIzNTYsImV4cCI6MjA4NTg3ODM1Nn0.WABHx4ilFRkhPHP-y4ZC4E8Kb7PRqY-cyxI8cVS8Tyc'
        );

        async function loadFeaturedDeals() {
            const grid = document.getElementById('productsGrid');
            const loading = document.getElementById('loading');
            const emptyState = document.getElementById('emptyState');

            try {
                // First try: Get from homepage_spotlights
                const { data: spotlights, error: spotError } = await sb
                    .from('homepage_spotlights')
                    .select(`
                        ads!homepage_spotlights_ad_id_fkey (
                            id,
                            title,
                            price,
                            currency,
                            is_negotiable,
                            image_urls,
                            region,
                            district,
                            profiles!ads_seller_id_fkey (is_verified)
                        )
                    `)
                    .eq('spotlight_type', 'featured_deals')
                    .eq('is_active', true)
                    .gt('ends_at', new Date().toISOString())
                    .order('display_order');

                let ads = [];
                
                if (spotlights && spotlights.length > 0) {
                    ads = spotlights.map(s => s.ads).filter(Boolean);
                } else {
                    // Fallback: Get featured ads from ads table
                    const { data: featuredAds } = await sb
                        .from('ads')
                        .select(`
                            id,
                            title,
                            price,
                            currency,
                            is_negotiable,
                            image_urls,
                            region,
                            district,
                            profiles!ads_seller_id_fkey (is_verified)
                        `)
                        .eq('status', 'active')
                        .eq('is_featured', true)
                        .order('created_at', { ascending: false })
                        .limit(20);
                    
                    ads = featuredAds || [];
                }

                loading.style.display = 'none';

                if (ads.length === 0) {
                    emptyState.style.display = 'block';
                    return;
                }

                grid.innerHTML = ads.map(ad => `
                    <a href="ad-detail.html?id=${ad.id}" class="product-card">
                        <div class="product-image">
                            <img src="${ad.image_urls?.[0] || 'https://via.placeholder.com/300'}" 
                                 alt="${ad.title}"
                                 onerror="this.src='https://via.placeholder.com/300'">
                            <span class="product-badge">FEATURED</span>
                        </div>
                        <div class="product-info">
                            <div class="product-title">${ad.title.substring(0, 50)}</div>
                            <div class="product-price">UGX ${parseInt(ad.price || 0).toLocaleString()}</div>
                            <div class="product-meta">
                                <i class="fas fa-map-marker-alt"></i> ${ad.district || ad.region || 'Uganda'}
                            </div>
                        </div>
                    </a>
                `).join('');

            } catch (error) {
                console.error('Error:', error);
                loading.style.display = 'none';
                emptyState.style.display = 'block';
            }
        }

        document.addEventListener('DOMContentLoaded', loadFeaturedDeals);
    </script>
</body>
</html>
