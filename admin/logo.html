<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Schist.online</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0F172A 0%, #1E1B4B 50%, #2D1B4B 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            position: relative;
            overflow: hidden;
        }

        /* Animated Background Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            background: rgba(139, 92, 246, 0.4);
            border-radius: 50%;
            animation: float 20s infinite linear;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.5;
            }
            90% {
                opacity: 0.5;
            }
            100% {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* Main Container */
        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            animation: fadeInUp 1s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 3D Cube Logo Container */
        .logo-container {
            margin-bottom: 30px;
            cursor: pointer;
        }

        .cube-wrapper {
            width: 180px;
            height: 180px;
            margin: 0 auto;
            perspective: 1000px;
            animation: floatLogo 3s ease-in-out infinite;
        }

        @keyframes floatLogo {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-15px);
            }
        }

        .cube {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            animation: rotateCube 8s infinite linear;
        }

        @keyframes rotateCube {
            0% {
                transform: rotateX(0deg) rotateY(0deg);
            }
            100% {
                transform: rotateX(360deg) rotateY(360deg);
            }
        }

        .cube-face {
            position: absolute;
            width: 180px;
            height: 180px;
            opacity: 0.95;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.5);
        }

        .cube-face-front {
            transform: translateZ(90px);
            background: linear-gradient(135deg, #8B5CF6, #6B21E5);
            border: 2px solid rgba(255,255,255,0.3);
        }

        .cube-face-back {
            transform: rotateY(180deg) translateZ(90px);
            background: linear-gradient(135deg, #6B21E5, #4C1D95);
            border: 2px solid rgba(255,255,255,0.3);
        }

        .cube-face-right {
            transform: rotateY(90deg) translateZ(90px);
            background: linear-gradient(135deg, #A855F7, #7C3AED);
            border: 2px solid rgba(255,255,255,0.3);
        }

        .cube-face-left {
            transform: rotateY(-90deg) translateZ(90px);
            background: linear-gradient(135deg, #7C3AED, #5B21B6);
            border: 2px solid rgba(255,255,255,0.3);
        }

        .cube-face-top {
            transform: rotateX(90deg) translateZ(90px);
            background: linear-gradient(135deg, #C084FC, #8B5CF6);
            border: 2px solid rgba(255,255,255,0.3);
        }

        .cube-face-bottom {
            transform: rotateX(-90deg) translateZ(90px);
            background: linear-gradient(135deg, #5B21B6, #4C1D95);
            border: 2px solid rgba(255,255,255,0.3);
        }

        /* Inner Glow Effect */
        .cube-face::after {
            content: '';
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            background: radial-gradient(circle at center, rgba(255,255,255,0.2), transparent);
            border-radius: 10px;
            pointer-events: none;
        }

        /* Logo Text */
        .logo-text {
            font-size: 4rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #FFFFFF, #C084FC, #A855F7, #8B5CF6);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: gradientShift 3s ease infinite, glowPulse 2s ease-in-out infinite;
            margin-bottom: 20px;
            text-shadow: 0 0 30px rgba(139, 92, 246, 0.5);
        }

        @keyframes gradientShift {
            0%, 100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }

        @keyframes glowPulse {
            0%, 100% {
                text-shadow: 0 0 20px rgba(139, 92, 246, 0.3);
            }
            50% {
                text-shadow: 0 0 40px rgba(139, 92, 246, 0.8);
            }
        }

        /* Tagline */
        .tagline {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 2px;
            font-weight: 400;
            animation: fadeInUp 1s ease-out 0.3s both;
            border-top: 1px solid rgba(139, 92, 246, 0.3);
            display: inline-block;
            padding-top: 20px;
        }

        /* Loading Animation */
        .loading-dots {
            display: inline-flex;
            gap: 4px;
            margin-top: 30px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #8B5CF6;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) {
            animation-delay: -0.32s;
        }

        .dot:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes bounce {
            0%, 80%, 100% {
                transform: scale(0);
                opacity: 0.3;
            }
            40% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* Hover Effects */
        .cube-wrapper:hover .cube {
            animation: rotateCube 4s infinite linear;
        }

        .logo-container:hover .logo-text {
            transform: scale(1.02);
            transition: transform 0.3s ease;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .cube-wrapper {
                width: 120px;
                height: 120px;
            }
            
            .cube-face {
                width: 120px;
                height: 120px;
            }
            
            .cube-face-front {
                transform: translateZ(60px);
            }
            
            .cube-face-back {
                transform: rotateY(180deg) translateZ(60px);
            }
            
            .cube-face-right {
                transform: rotateY(90deg) translateZ(60px);
            }
            
            .cube-face-left {
                transform: rotateY(-90deg) translateZ(60px);
            }
            
            .cube-face-top {
                transform: rotateX(90deg) translateZ(60px);
            }
            
            .cube-face-bottom {
                transform: rotateX(-90deg) translateZ(60px);
            }
            
            .logo-text {
                font-size: 2.5rem;
            }
            
            .tagline {
                font-size: 0.9rem;
            }
        }

        /* Sparkle Effect */
        .sparkle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            animation: sparkle 1s ease-out forwards;
        }

        @keyframes sparkle {
            0% {
                transform: scale(0);
                opacity: 1;
            }
            100% {
                transform: scale(1.5);
                opacity: 0;
            }
        }

        /* Reflection Effect */
        .reflection {
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 20px;
            background: radial-gradient(ellipse at center, rgba(139, 92, 246, 0.4), transparent);
            border-radius: 50%;
            filter: blur(8px);
            animation: pulseReflection 2s ease-in-out infinite;
        }

        @keyframes pulseReflection {
            0%, 100% {
                width: 120px;
                opacity: 0.4;
            }
            50% {
                width: 140px;
                opacity: 0.7;
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <div class="container">
        <div class="logo-container">
            <div class="cube-wrapper">
                <div class="cube">
                    <div class="cube-face cube-face-front"></div>
                    <div class="cube-face cube-face-back"></div>
                    <div class="cube-face cube-face-right"></div>
                    <div class="cube-face cube-face-left"></div>
                    <div class="cube-face cube-face-top"></div>
                    <div class="cube-face cube-face-bottom"></div>
                </div>
            </div>
            <div class="reflection"></div>
        </div>
        
        <h1 class="logo-text">schist.online</h1>
        <div class="tagline">
            <span>CONNECT • TRADE • GROW</span>
        </div>
        
        <div class="loading-dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

    <script>
        // Create animated particles
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = 50;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                
                // Random size between 2px and 8px
                const size = Math.random() * 6 + 2;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                
                // Random position
                particle.style.left = `${Math.random() * 100}%`;
                
                // Random animation duration between 10s and 30s
                const duration = Math.random() * 20 + 10;
                particle.style.animationDuration = `${duration}s`;
                
                // Random delay
                particle.style.animationDelay = `${Math.random() * 10}s`;
                
                // Random opacity
                particle.style.opacity = Math.random() * 0.5 + 0.2;
                
                particlesContainer.appendChild(particle);
            }
        }
        
        // Create sparkle effect on click
        function createSparkle(e) {
            const sparkle = document.createElement('div');
            sparkle.classList.add('sparkle');
            sparkle.style.left = `${e.clientX}px`;
            sparkle.style.top = `${e.clientY}px`;
            document.body.appendChild(sparkle);
            
            setTimeout(() => {
                sparkle.remove();
            }, 1000);
        }
        
        // Add click effect to logo
        function addClickEffect() {
            const container = document.querySelector('.container');
            container.addEventListener('click', (e) => {
                createSparkle(e);
                
                // Add subtle scale animation
                const cube = document.querySelector('.cube');
                cube.style.transform = 'scale(1.1)';
                setTimeout(() => {
                    cube.style.transform = '';
                }, 200);
            });
        }
        
        // Dynamic gradient shift on hover
        function addHoverEffects() {
            const logoText = document.querySelector('.logo-text');
            const cubeWrapper = document.querySelector('.cube-wrapper');
            
            cubeWrapper.addEventListener('mouseenter', () => {
                logoText.style.animation = 'gradientShift 1s ease infinite, glowPulse 1s ease-in-out infinite';
            });
            
            cubeWrapper.addEventListener('mouseleave', () => {
                logoText.style.animation = 'gradientShift 3s ease infinite, glowPulse 2s ease-in-out infinite';
            });
        }
        
        // Add rainbow border effect on cube faces on hover
        function addRainbowEffect() {
            const cubeFaces = document.querySelectorAll('.cube-face');
            
            cubeFaces.forEach(face => {
                face.addEventListener('mouseenter', () => {
                    face.style.filter = 'brightness(1.2) saturate(1.5)';
                    face.style.transition = 'all 0.3s ease';
                });
                
                face.addEventListener('mouseleave', () => {
                    face.style.filter = '';
                });
            });
        }
        
        // Initialize everything
        createParticles();
        addClickEffect();
        addHoverEffects();
        addRainbowEffect();
        
        // Add loading animation with fade out (optional)
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loadingDots = document.querySelector('.loading-dots');
                if (loadingDots) {
                    loadingDots.style.opacity = '0.5';
                }
            }, 2000);
        });
        
        // Create additional sparkles periodically
        setInterval(() => {
            if (Math.random() > 0.7) {
                const x = Math.random() * window.innerWidth;
                const y = Math.random() * window.innerHeight;
                const sparkle = document.createElement('div');
                sparkle.classList.add('sparkle');
                sparkle.style.left = `${x}px`;
                sparkle.style.top = `${y}px`;
                document.body.appendChild(sparkle);
                setTimeout(() => sparkle.remove(), 1000);
            }
        }, 3000);
        
        // Console greeting
        console.log('%c✨ Welcome to Schist.online! ✨', 'color: #8B5CF6; font-size: 16px; font-weight: bold;');
        console.log('%cConnect • Trade • Grow', 'color: #C084FC; font-size: 12px;');
    </script>
</body>
</html>
