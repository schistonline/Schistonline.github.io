<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Upload Product Video - iBlue B2B</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #0B4F6C;
            --primary-dark: #083b4f;
            --secondary: #10B981;
            --danger: #EF4444;
            --gray-100: #F3F4F6;
            --gray-200: #E5E7EB;
            --gray-300: #D1D5DB;
            --gray-500: #6B7280;
            --gray-700: #374151;
            --gray-800: #1F2937;
            --white: #FFFFFF;
            --shadow: 0 2px 8px rgba(0,0,0,0.1);
            --radius: 16px;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--gray-100);
            color: var(--gray-800);
            line-height: 1.5;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            background: var(--white);
            padding: 20px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .back-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: var(--gray-100);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: var(--gray-700);
            cursor: pointer;
        }
        
        .header h1 {
            font-size: 20px;
            font-weight: 600;
        }
        
        .upload-card {
            background: var(--white);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
        }
        
        .upload-area {
            border: 2px dashed var(--gray-300);
            border-radius: var(--radius);
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 20px;
        }
        
        .upload-area:hover {
            border-color: var(--primary);
            background: rgba(11, 79, 108, 0.05);
        }
        
        .upload-area i {
            font-size: 48px;
            color: var(--primary);
            margin-bottom: 12px;
        }
        
        .upload-area h3 {
            font-size: 18px;
            margin-bottom: 8px;
        }
        
        .upload-area p {
            color: var(--gray-500);
            font-size: 14px;
        }
        
        .video-preview {
            margin-bottom: 20px;
            border-radius: var(--radius);
            overflow: hidden;
            background: #000;
            max-height: 400px;
        }
        
        .video-preview video {
            width: 100%;
            height: auto;
            display: block;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--gray-700);
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--gray-300);
            border-radius: 12px;
            font-size: 14px;
            font-family: inherit;
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        
        /* Compression Info Banner */
        .compression-banner {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .compression-banner i {
            font-size: 24px;
        }
        
        .compression-banner-content {
            flex: 1;
        }
        
        .compression-banner-title {
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .compression-banner-text {
            font-size: 13px;
            opacity: 0.9;
        }
        
        .file-info {
            font-size: 13px;
            margin: 15px 0;
            padding: 16px;
            background: var(--gray-100);
            border-radius: 12px;
            border-left: 4px solid var(--secondary);
            display: none;
        }
        
        .file-info.show {
            display: block;
        }
        
        .file-info-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px dashed var(--gray-300);
        }
        
        .file-info-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        
        .file-info-label {
            color: var(--gray-700);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .file-info-label i {
            color: var(--primary);
            width: 18px;
        }
        
        .file-info-value {
            font-weight: 600;
            color: var(--primary);
        }
        
        .savings-percent {
            color: var(--secondary);
            font-weight: 700;
            font-size: 16px;
        }
        
        .progress-bar {
            height: 8px;
            background: var(--gray-200);
            border-radius: 4px;
            overflow: hidden;
            margin: 20px 0 10px 0;
            display: none;
        }
        
        .progress-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s;
        }
        
        .progress-message {
            font-size: 14px;
            color: var(--gray-700);
            margin-bottom: 15px;
            text-align: center;
            display: none;
            font-weight: 500;
        }
        
        .progress-message.show {
            display: block;
        }
        
        .progress-message i {
            color: var(--primary);
            margin-right: 8px;
        }
        
        .upload-btn {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background 0.2s;
        }
        
        .upload-btn:hover:not(:disabled) {
            background: var(--primary-dark);
        }
        
        .upload-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .upload-btn i {
            font-size: 18px;
        }
        
        .tips-card {
            background: var(--white);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow);
        }
        
        .tips-card h3 {
            font-size: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .tips-card h3 i {
            color: var(--secondary);
        }
        
        .tips-list {
            list-style: none;
        }
        
        .tips-list li {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid var(--gray-200);
            font-size: 14px;
            color: var(--gray-700);
        }
        
        .tips-list li:last-child {
            border-bottom: none;
        }
        
        .tips-list li i {
            width: 20px;
            color: var(--secondary);
        }
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--gray-800);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            z-index: 1000;
            opacity: 0;
            transition: all 0.3s;
        }
        
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        
        .toast.success { background: var(--secondary); }
        .toast.error { background: var(--danger); }
        .toast.warning { background: #F59E0B; }
        .toast.info { background: var(--primary); }
        
        @media (max-width: 480px) {
            .container { padding: 12px; }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <button class="back-btn" onclick="window.history.back()">
                <i class="fas fa-arrow-left"></i>
            </button>
            <h1>Upload Product Video</h1>
        </div>

        <!-- Upload Card -->
        <div class="upload-card">
            <!-- Upload Area -->
            <div class="upload-area" id="uploadArea">
                <input type="file" id="videoInput" accept="video/*" style="display: none;">
                <i class="fas fa-cloud-upload-alt"></i>
                <h3>Click to upload video</h3>
                <p>MP4, MOV, or WebM (Up to 500MB)</p>
            </div>

            <!-- Video Preview (hidden initially) -->
            <div class="video-preview" id="videoPreview" style="display: none;">
                <video controls id="previewVideo"></video>
            </div>
            
           

           

            <!-- Product Selection -->
            <div class="form-group">
                <label><i class="fas fa-box"></i> Select Product</label>
                <select id="productSelect">
                    <option value="">-- Select a product --</option>
                </select>
            </div>

            <!-- Caption -->
            <div class="form-group">
                <label><i class="fas fa-caption"></i> Caption</label>
                <textarea id="caption" placeholder="Describe what's happening in this video..."></textarea>
            </div>
            
         

            <!-- Thumbnail Time & Category -->
            <div class="form-row">
                <div class="form-group">
                    <label><i class="fas fa-image"></i> Thumbnail Time (sec)</label>
                    <input type="number" id="thumbnailTime" min="0" value="1" placeholder="1">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-tag"></i> Category</label>
                    <select id="videoCategory">
                        <option value="product_demo">Product Demonstration</option>
                        <option value="factory_process">Factory Process</option>
                        <option value="packaging">Packaging</option>
                        <option value="usage">Product Usage</option>
                        <option value="testimonial">Testimonial</option>
                        <option value="other">Other</option>
                    </select>
                </div>
            </div>

            <!-- Progress Bar and Message -->
            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-message" id="progressMessage">
                <i class="fas fa-spinner fa-pulse"></i> <span></span>
            </div>

            <!-- Upload Button -->
            <button class="upload-btn" id="uploadBtn" onclick="VideoUploader.uploadVideo()" disabled>
                <i class="fas fa-upload"></i>
                Upload Video
            </button>
        </div>

        <!-- Tips Card -->
        <div class="tips-card">
            <h3><i class="fas fa-lightbulb"></i> Tips for Great Videos</h3>
            <ul class="tips-list">
                <li><i class="fas fa-check-circle"></i> Show the product in action</li>
                <li><i class="fas fa-check-circle"></i> Keep it under 60 seconds</li>
                <li><i class="fas fa-check-circle"></i> Add captions for clarity</li>
                <li><i class="fas fa-check-circle"></i> Show product features close-up</li>
                <li><i class="fas fa-check-circle"></i> Include your branding subtly</li>
                <li><i class="fas fa-check-circle"></i> Demonstrate quality and craftsmanship</li>
            </ul>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="js/upload-product-video.js"></script>
</body>
</html>
